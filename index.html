 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I'm So Sorry... 🥺</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* =============================================
       ROOT & BASE (Apology Cool/Sad Theme)
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      /* Bddelna l-alwan l l-azraq o l-violet l-7anin */
      background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 30%, #e0e7ff 60%, #eee0ff 100%);
      position: relative;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      animation: blobFloat 8s ease-in-out infinite alternate;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #38bdf8, #818cf8);
      top: -100px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #c084fc, #a78bfa);
      bottom: -80px; right: -80px;
      animation-delay: -4s;
    }

    @keyframes blobFloat {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* =============================================
       MAIN CARD
    ============================================= */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1.5px solid rgba(255,255,255,0.8);
      border-radius: 2.5rem;
      box-shadow:
        0 8px 40px rgba(100, 150, 255, 0.12),
        0 2px 0 rgba(255,255,255,0.9) inset;
      padding: 2.5rem 2rem 2rem;
      max-width: 480px;
      width: 92%;
      text-align: center;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1);
    }

    /* =============================================
       HEADING
    ============================================= */
    .main-heading {
      font-family: 'Pacifico', cursive;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      background: linear-gradient(135deg, #1d4ed8, #3b82f6, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.3;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    /* =============================================
       CHARACTER IMAGE
    ============================================= */
    .character-wrap {
      position: relative;
      display: inline-block;
      margin: 1.2rem auto;
    }
    .character-img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.9);
      box-shadow: 0 6px 30px rgba(99, 102, 241, 0.2);
      transition: opacity 0.4s ease, transform 0.4s ease;
      background: #f0f7ff;
    }
    .character-img.fading { opacity: 0; transform: scale(0.92); }

    .character-wrap::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(#3b82f6, #e0e7ff, #6366f1, #f0f7ff, #3b82f6);
      z-index: -1;
      animation: spin 6s linear infinite;
      opacity: 0.4;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* =============================================
       BUTTONS
    ============================================= */
    .btn-yes {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(34,197,94,0.4), 0 1px 0 rgba(255,255,255,0.3) inset;
      transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), font-size 0.5s cubic-bezier(.34,1.56,.64,1), padding 0.5s ease, box-shadow 0.3s ease;
      position: relative;
      z-index: 20;
      letter-spacing: 0.02em;
    }
    .btn-yes:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(34,197,94,0.5), 0 1px 0 rgba(255,255,255,0.3) inset;
    }
    .btn-yes:active { transform: scale(0.97); }

    .btn-no {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      background: linear-gradient(135deg, #64748b, #475569);
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(71, 85, 105, 0.3);
      transition: background 0.3s ease, box-shadow 0.3s ease;
      white-space: nowrap;
      position: relative;
      z-index: 20;
      letter-spacing: 0.02em;
    }
    .btn-no:hover { box-shadow: 0 8px 22px rgba(71, 85, 105, 0.4); }
    .btn-no:active { transform: scale(0.97); }

    .btn-no.flee {
      position: fixed !important;
      transition: top 0.25s cubic-bezier(.34,1.56,.64,1), left 0.25s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease;
      z-index: 9999;
      font-size: 0.75rem;
      padding: 0.5rem 1.2rem;
      opacity: 0.8;
    }

    /* =============================================
       ANIMATIONS
    ============================================= */
    .heart-float {
      position: fixed;
      font-size: 1.4rem;
      pointer-events: none;
      z-index: 1;
      animation: floatUp 5s ease-in forwards;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg) scale(0.8); opacity: 0; }
      15%  { opacity: 1; }
      85%  { opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(25deg) scale(1.1); opacity: 0; }
    }

    .confetti-piece {
      position: fixed;
      width: 10px;
      height: 10px;
      pointer-events: none;
      z-index: 9999;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .success-state {
      animation: popIn 0.6s cubic-bezier(.34,1.56,.64,1) forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.7); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (max-width: 400px) {
      .card { padding: 1.8rem 1.2rem 1.5rem; }
      .character-img { width: 140px; height: 140px; }
    }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div id="hearts-bg"></div>

  <div class="card" id="main-card">
    <h1 class="main-heading" id="main-heading">Please forgive me, I'm sorry... 🥺</h1>
    <p class="text-2xl mt-1 mb-1 tracking-widest select-none" id="sparkle-row">✨🙏✨</p>

    <div class="character-wrap">
      <img
        id="character-img"
        class="character-img mx-auto block"
        src="gif1.gif"
        alt="Cute character"
      />
    </div>

    <p class="text-indigo-600 font-semibold text-sm mt-1 mb-4 min-h-[1.5rem] transition-all duration-300" id="sub-caption">
      Can you give me a kiss? 🌸
    </p>

    <div class="flex flex-wrap items-center justify-center gap-4" id="btn-row">
      <button class="btn-yes" id="btn-yes" onclick="handleYes()">Yes, I forgive you! 💖</button>
      <button class="btn-no"  id="btn-no"  onclick="handleNo()">No</button>
    </div>
  </div>

  <script>
    // =============================================
    // 📌 L-TARTIB L-EXACT MN GIF1 L LAST
    // =============================================
    const images = [
      "gif1.gif", 
      "gif2.gif", 
      "gif3.jpg", 
      "gif4.gif", 
      "gif5.gif", 
      "gif6.gif", 
      "last.webp" 
    ];

    // Bddelna hna l-khotat bach t-msha m3a l-asaf
    const noStages = [
      { text: "Are you still mad? 🥺",                caption: "Please think it over...",              imgIdx: 1 },
      { text: "I'm really, really sorry... 💔",       caption: "I didn't mean to hurt you...",        imgIdx: 2 },
      { text: "Please forgive me?? 😭😭",             caption: "Just one sweet kiss? Please...",       imgIdx: 3 },
      { text: "My heart is breaking... 💔",           caption: "Look how sad I am without you...",    imgIdx: 4 },
      { text: "Last chance to make up! 😭",           caption: "I promise to make it up to you...",   imgIdx: 5 }
    ];

    const yesSizes = [1.1, 1.7, 2.4, 3.2, 4.2];

    let noClickCount = 0;
    let fleeMode     = false;

    const btnYes     = document.getElementById('btn-yes');
    const btnNo      = document.getElementById('btn-no');
    const charImg    = document.getElementById('character-img');
    const heading    = document.getElementById('main-heading');
    const caption    = document.getElementById('sub-caption');
    const sparkle    = document.getElementById('sparkle-row');

    function handleNo() {
      if (fleeMode) { flee(); return; }

      noClickCount++;
      const stage = noStages[Math.min(noClickCount - 1, noStages.length - 1)];

      btnNo.textContent = stage.text;
      caption.textContent = stage.caption;

      const sizeIdx = Math.min(noClickCount, yesSizes.length - 1);
      const newSize = yesSizes[sizeIdx];
      btnYes.style.fontSize  = newSize + 'rem';
      btnYes.style.padding   = (0.5 + sizeIdx * 0.3) + 'rem ' + (1.5 + sizeIdx * 0.6) + 'rem';
      btnYes.style.boxShadow = `0 ${4 + sizeIdx * 4}px ${18 + sizeIdx * 10}px rgba(34,197,94,${0.4 + sizeIdx * 0.07})`;

      swapImage(images[stage.imgIdx]);

      if (noClickCount >= 5) {
        fleeMode = true;
        btnNo.classList.add('flee');
        btnNo.style.top  = '50%';
        btnNo.style.left = '50%';
        btnNo.addEventListener('mouseenter', flee);
        btnNo.addEventListener('touchstart', flee, { passive: true });
      }
    }

    function handleYes() {
      btnNo.removeEventListener('mouseenter', flee);
      btnNo.style.display = 'none';
      btnYes.style.display = 'none';

      heading.textContent = "Thank you for forgiving me! 🥰❤️";
      caption.textContent = "You've made me the happiest, I wait for the kiss on Instagram! 💞";
      sparkle.textContent = "🎉💕🎉";

      swapImage(images[6]);
      document.getElementById('main-card').classList.add('success-state');

      launchConfetti();

      for (let i = 0; i < 20; i++) {
        setTimeout(() => spawnHeart(), i * 120);
      }
    }

    function flee() {
      const margin = 100;
      const maxX   = window.innerWidth  - margin;
      const maxY   = window.innerHeight - margin;
      const newX   = Math.max(margin, Math.random() * maxX);
      const newY   = Math.max(margin, Math.random() * maxY);

      btnNo.style.left = newX + 'px';
      btnNo.style.top  = newY + 'px';
    }

    function swapImage(src) {
      charImg.classList.add('fading');
      setTimeout(() => {
        charImg.src = src;
        charImg.onload = () => charImg.classList.remove('fading');
        setTimeout(() => charImg.classList.remove('fading'), 400);
      }, 380);
    }

    const heartEmojis = ['💕','💗','💖','💓','🌸','✨','💝'];
    function spawnHeart() {
      const el   = document.createElement('span');
      el.className = 'heart-float';
      el.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
      el.style.left  = Math.random() * 100 + 'vw';
      el.style.bottom = '-2rem';
      el.style.animationDuration = (3.5 + Math.random() * 3) + 's';
      el.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      document.getElementById('hearts-bg').appendChild(el);
      setTimeout(() => el.remove(), 6500);
    }

    setInterval(spawnHeart, 1800);
    for (let i = 0; i < 5; i++) setTimeout(spawnHeart, i * 400);

    const confettiColors = [
      '#3b82f6','#60a5fa','#93c5fd','#a78bfa',
      '#22c55e','#facc15','#38bdf8','#c084fc','#fb923c'
    ];

    function launchConfetti() {
      for (let i = 0; i < 120; i++) {
        setTimeout(() => makeConfetto(), i * 25);
      }
    }

    function makeConfetto() {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left            = Math.random() * 100 + 'vw';
      el.style.top             = '-10px';
      el.style.backgroundColor = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      el.style.width           = (6 + Math.random() * 10) + 'px';
      el.style.height          = (6 + Math.random() * 10) + 'px';
      el.style.borderRadius    = Math.random() > 0.5 ? '50%' : '2px';
      el.style.animationDuration = (2 + Math.random() * 2.5) + 's';
      el.style.animationDelay    = (Math.random() * 0.5) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5000);
    }
  </script>
</body>
</html>
